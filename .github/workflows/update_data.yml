name: Keep Alive and Update

on:
  schedule:
    # 30分ごとに実行
    - cron: '*/30 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # パーソナルアクセストークンを使わなくても、デフォルトのGITHUB_TOKENで
          # 自分のリポジトリへのpushが可能です
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: python update_data.py

      - name: Keep Alive (Update README timestamp)
        # 60日間の停止を回避するため、定期的にダミーの変更を加えます
        # ここでは README.md の末尾に最終チェック日時を追記します
        run: |
          echo -e "\n\n---\n*Last scheduled check: $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S') (JST)*" >> README.md

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add games.json README.md
          # 変更がある場合（データ更新 or READMEの追記）にコミットしてpush
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update and keep-alive: $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S')" && git push)
