<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious Fruit - 名作アイワナラインナップ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <div class="logo">
                <h1>I Wanna Masterpieces</h1>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ゲーム名で検索...">
            </div>
            <div class="filter-container">
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-category="all">全て</button>
                    <button class="filter-btn" data-category="needle">針ゲー</button>
                    <button class="filter-btn" data-category="avoidance">耐久</button>
                    <button class="filter-btn" data-category="other">その他</button>
                </div>
            </div>
        </header>

        <main>
            <div class="controls">
                <div class="sort-options">
                    <label>並び替え:</label>
                    <select id="sortSelect">
                        <option value="ratings_desc">コメント数が多い順</option>
                        <option value="rating_desc">評価が高い順</option>
                        <option value="newest">新しい順</option>
                        <option value="difficulty_desc">難易度が高い順</option>
                        <option value="difficulty_asc">難易度が低い順</option>
                    </select>
                </div>
                <div class="stats" id="statsDisplay">
                    <!-- Stats will be inserted here -->
                </div>
            </div>

            <div class="grid" id="gameGrid">
                <!-- Game cards will be appended here by JS -->
            </div>

            <div class="pagination" id="pagination">
                <button id="prevBtn" class="page-btn">&laquo; 前へ</button>
                <div id="pageNumbers" class="page-numbers"></div>
                <button id="nextBtn" class="page-btn">次へ &raquo;</button>
                <div class="page-jump">
                    <input type="number" id="pageInput" min="1" placeholder="Page">
                    <button id="jumpBtn" class="page-btn">移動</button>
                </div>
            </div>
        </main>
        
        <footer>
            <p>データ元: <a href="https://delicious-fruit.com/" target="_blank">Delicious-Fruit.com</a></p>
        </footer>
    </div>
    <!-- Back to top button -->
    <button id="backToTopBtn" title="トップへ戻る">↑ Top</button>

    <!-- Load the games data -->
    <script src="games.js?v=20260316_v10"></script>
    <script src="script.js"></script>
</body>
</html>
